<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Program Cek Nilai Mahasiswa</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<h1>Sistem Penilaian Akademik</h1>
		</header>

		<div class="container">
			<main class="content">
				<h2>Form Input Nilai</h2>
				<p>Masukkan data mahasiswa untuk menentukan huruf mutu.</p>

				<div class="form-card">
					<div class="form-row">
						<label for="nim">NIM Mahasiswa</label>
						<input type="text" id="nim" placeholder="Contoh: 22010101" />
					</div>

					<div class="form-row">
						<label for="nilai">Nilai Mata Kuliah</label>
						<input type="number" id="nilai" placeholder="0 - 100" />
					</div>

					<button class="btn-cek" onclick="cekNilai()">Cek Nilai</button>

					<div id="hasil" class="result-box">Menunggu input...</div>
				</div>
			</main>

			<aside class="sidebar">
				<h3>Tabel Referensi</h3>
				<table>
					<tr>
						<th>Rentang</th>
						<th>Mutu</th>
					</tr>
					<tr>
						<td>80 - 100</td>
						<td>A</td>
					</tr>
					<tr>
						<td>70 - 79</td>
						<td>B</td>
					</tr>
					<tr>
						<td>60 - 69</td>
						<td>C</td>
					</tr>
					<tr>
						<td>50 - 59</td>
						<td>D</td>
					</tr>
					<tr>
						<td>0 - 49</td>
						<td>E</td>
					</tr>
				</table>
			</aside>
		</div>

		<footer>
			<p>&copy; 2026 Program JavaScript Sederhana</p>
		</footer>

		<script src="script.js"></script>
	</body>
</html>
